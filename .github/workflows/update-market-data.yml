name: Update Market Data

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh market-data.json
        run: python3 scripts/update-market-data.py

      - name: Commit updated market data
        run: |
          if git diff --quiet -- market-data.json market-data.js; then
            echo "No market data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-data.json market-data.js
          git commit -m "chore: update market data"
          git push
